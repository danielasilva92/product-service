spring.application.name=fakestoreapi
server.port=${PORT:5000}
# Gemensamma JPA insallningar
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}
# JWT (samma secret som user-service)
jwt.secret=${JWT_SECRET}
# Externa produkt-API:t (Yahyas)
fakestore.base-url=${FAKESTORE_URL:https://yahyatesting-env.eba-sarnymwd.eu-north-1.elasticbeanstalk.com}
# Vilken profil som ar aktiv (override med SPRING_PROFILES_ACTIVE)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}